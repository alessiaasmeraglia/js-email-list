<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- Contenitore principale -->
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-4">

                        <!-- Contenuto della card -->
                        <h1 class="text-center mb-2">Email List</h1>
                        <p class="text-center text-muted mb-4">
                            Genera 10 email casuali tramite API
                        </p>

                        <div class="d-grid mb-4">
                            <button id="generateBtn" class="btn btn-primary btn-lg rounded-3">
                                Genera altre 10 email
                            </button>
                        </div>

                        <div class="d-flex justify-content-center">
                            <ul id="emailList" class="list-group list-group-flush"></ul>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
